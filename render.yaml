services:
  # ---------------------------------------------------------------------------
  # 1. Go WebSocket Gateway & Presence Node
  # ---------------------------------------------------------------------------
  - type: web
    name: nexaverse-mvp
    env: docker
    plan: free
    dockerfilePath: apps/go-gateway/Dockerfile
    envVars:
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EXPO_PUBLIC_GATEWAY_URL
        sync: false
      - key: PORT
        value: "8080"

  # ---------------------------------------------------------------------------
  # 2. Rust Wallet Ledger & Atomic Escrow Engine
  # ---------------------------------------------------------------------------
  - type: web
    name: nexaverse-mvp-ledger
    env: docker
    plan: free
    rootDir: services/rust-ledger
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RPC_PROVIDER_URL
        sync: false
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      - key: PORT
        value: "8081"

  # ---------------------------------------------------------------------------
  # 3. NestJS Social Feed & Media Processor
  # ---------------------------------------------------------------------------
  - type: web
    name: nexaverse-mvp-media
    env: docker
    plan: free
    rootDir: services/nestjs-media
    dockerfilePath: Dockerfile
    envVars:
      - key: REDIS_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      - key: PORT
        value: "8082"
