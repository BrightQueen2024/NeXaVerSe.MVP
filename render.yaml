services:
  # ---------------------------------------------------------------------------
  # 1. Go WebSocket Gateway & Presence Node
  # ---------------------------------------------------------------------------
  - type: web
    name: nexa-go-gateway
    env: docker
    plan: free
    rootDir: go-gateway
    dockerfilePath: Dockerfile
    envVars:
      - key: REDIS_URL
        value: "redis://default:placeholder-password@your-upstash-redis.upstash.io:6379"
      - key: PORT
        value: "8080"

  # ---------------------------------------------------------------------------
  # 2. Rust Wallet Ledger & Atomic Escrow Engine
  # ---------------------------------------------------------------------------
  - type: web
    name: nexa-rust-ledger
    env: docker
    plan: free
    rootDir: rust-ledger
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:placeholder-pass@ep-placeholder-pool.us-east-2.aws.neon.tech/neondb?sslmode=require"
      - key: RPC_PROVIDER_URL
        value: "https://eth-sepolia.g.alchemy.com/v2/placeholder-api-key"
      - key: PORT
        value: "8081"

  # ---------------------------------------------------------------------------
  # 3. NestJS Social Feed & Media Processor
  # ---------------------------------------------------------------------------
  - type: web
    name: nexa-nestjs-media
    env: docker
    plan: free
    rootDir: nestjs-media
    dockerfilePath: Dockerfile
    envVars:
      - key: REDIS_URL
        value: "redis://default:placeholder-password@your-upstash-redis.upstash.io:6379"
      - key: MONGODB_URI
        value: "mongodb+srv://nexa-user:placeholder-pass@cluster-nexa.mongodb.net/nexaverse?retryWrites=true&w=majority"
      - key: PORT
        value: "8082"
