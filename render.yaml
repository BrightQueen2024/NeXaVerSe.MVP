services:
  # ---------------------------------------------------------------------------
  # 1. Go WebSocket Gateway & Presence Node
  # ---------------------------------------------------------------------------
  - type: web
    name: nexa-go-gateway
    env: docker
    plan: free
    rootDir: go-gateway
    dockerfilePath: Dockerfile
    envVars:
      - key: REDIS_URL
        sync: false
      - key: PORT
        value: "8080"

  # ---------------------------------------------------------------------------
  # 2. Rust Wallet Ledger & Atomic Escrow Engine
  # ---------------------------------------------------------------------------
  - type: web
    name: nexa-rust-ledger
    env: docker
    plan: free
    rootDir: rust-ledger
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RPC_PROVIDER_URL
        sync: false
      - key: PORT
        value: "8081"

  # ---------------------------------------------------------------------------
  # 3. NestJS Social Feed & Media Processor
  # ---------------------------------------------------------------------------
  - type: web
    name: nexa-nestjs-media
    env: docker
    plan: free
    rootDir: nestjs-media
    dockerfilePath: Dockerfile
    envVars:
      - key: REDIS_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: PORT
        value: "8082"
