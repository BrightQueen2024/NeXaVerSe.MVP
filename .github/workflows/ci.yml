name: NeXaVerSe CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ==========================================
  # 1. SMART CONTRACTS COMPILATION & TESTING
  # ==========================================
  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json

      - name: Install Dependencies
        run: |
          cd contracts
          npm ci

      - name: Compile & Test Smart Contracts
        run: |
          cd contracts
          npx hardhat test

      # Upload ABI artifacts for the Rust build stage dependency mapping
      - name: Upload Contract Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-contracts
          path: contracts/artifacts/contracts/

  # ==========================================
  # 2. GO GATEWAY COMPILATION & LINT
  # ==========================================
  verify-go-gateway:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Verify Go compilation
        run: |
          cd go-gateway
          go build -v ./...

      - name: Run Go Tests
        run: |
          cd go-gateway
          go test -v ./...

  # ==========================================
  # 3. RUST LEDGER COMPILATION & LINT
  # ==========================================
  verify-rust-ledger:
    runs-on: ubuntu-latest
    needs: test-contracts # Requires contract compilation to resolve abigen! JSON paths
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions/setup-rust@v1
        with:
          rust-version: 1.75

      # Download Solidity ABI files generated in contract job
      - name: Download Contract Artifacts
        uses: actions/download-artifact@v4
        with:
          name: compiled-contracts
          path: contracts/artifacts/contracts/

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust-ledger/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-ledger/Cargo.toml') }}

      - name: Cargo Check & Verify compilation
        run: |
          cd rust-ledger
          cargo check --verbose

  # ==========================================
  # 4. NESTJS MEDIA COMPILATION
  # ==========================================
  verify-nestjs-media:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: nestjs-media/package-lock.json

      - name: Install Dependencies & Compile NestJS
        run: |
          cd nestjs-media
          npm ci
          npm run build

  # ==========================================
  # 5. DOCKER BUILD & PUSH (PRE-PRODUCTION)
  # ==========================================
  build-and-push-containers:
    runs-on: ubuntu-latest
    needs: [verify-go-gateway, verify-rust-ledger, verify-nestjs-media]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-docker-actions@v2

      - name: Login to DockerHub (or AWS ECR)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push Go WebSocket Gateway
      - name: Build Go Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: ./go-gateway
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nexa-go-gateway:latest

      # Build and push Rust Wallet Ledger
      - name: Build Rust Ledger Image
        uses: docker/build-push-action@v5
        with:
          context: ./rust-ledger
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nexa-rust-ledger:latest

      # Build and push NestJS social feed service
      - name: Build NestJS Media Image
        uses: docker/build-push-action@v5
        with:
          context: ./nestjs-media
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nexa-nestjs-media:latest
