name: Auto Tidy Go Modules
on:
  push:
    branches: [ main ]
jobs:
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run Tidy
        run: |
          cd go-gateway
          go mod tidy
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated go mod tidy execution"
          file_pattern: "go-gateway/go.mod go-gateway/go.sum"
